<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taal AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #2c3e50; }
        input[type="file"] { margin: 20px 0; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        #loading { display: none; margin-top: 20px; font-weight: bold; color: #e67e22; }
        #results { display: none; margin-top: 30px; text-align: left; background: #ecf0f1; padding: 20px; border-radius: 8px; }
        .taal-name { font-size: 24px; font-weight: bold; color: #27ae60; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Taal AI</h1>
        <p>Upload an audio file to detect the rhythmic cycle (Teentaal, Dadra, Bhajani).</p>

        <form id="uploadForm">
            <input type="file" id="audioFile" accept=".wav, .mp3" required>
            <br>
            <button type="submit">Analyze Audio</button>
        </form>

        <div id="loading">⏳ Analyzing audio... This may take a few seconds...</div>

        <div id="results">
            <h2 class="taal-name" id="predictedTaal"></h2>
            <p><b>Confidence:</b> <span id="confidence"></span>%</p>
            <p><b>Chunks Analyzed:</b> <span id="chunks"></span></p>
            <hr>
            <p><b>Vote Breakdown:</b></p>
            <pre id="votes"></pre>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async function(e) {
            e.preventDefault();
            
            let fileInput = document.getElementById('audioFile');
            let formData = new FormData();
            formData.append("audio_file", fileInput.files[0]);

            // UI updates
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';

            try {
                let response = await fetch('/upload', { method: 'POST', body: formData });
                let data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.error) {
                    alert("Error: " + data.error);
                } else {
                    document.getElementById('predictedTaal').innerText = "Prediction: " + data.predicted_taal;
                    document.getElementById('confidence').innerText = data.confidence;
                    document.getElementById('chunks').innerText = data.total_chunks;
                    document.getElementById('votes').innerText = JSON.stringify(data.chunk_votes, null, 2);
                    
                    document.getElementById('results').style.display = 'block';
                }
            } catch (err) {
                alert("Something went wrong!");
                document.getElementById('loading').style.display = 'none';
            }
        };
    </script>
</body>
</html>
